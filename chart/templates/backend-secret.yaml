apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secret
  labels:
    {{- include "praxis-form.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.backend.secrets.JWT_SECRET | quote }}
  ADMIN_DEFAULT_PASSWORD: {{ .Values.backend.secrets.ADMIN_DEFAULT_PASSWORD | quote }}

