#deployement de notre image dans le cluster kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:     
        - name: regcred
      containers:
        - name: backend
          image: ghcr.io/dihia-guemraoui/backend:v1.0.0
          imagePullPolicy: Always
          env:
            - name: MONGODB_URI
              value: mongodb://praxis-form-mongodb.praxis.svc.cluster.local:27017/paris-dihia
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: empty-secret
                  key:  JWT_SECRET
            - name: JWT_EXP_MINUTES
              value: '120'
            - name: ADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: empty-secret
                  key:  ADMIN_DEFAULT_PASSWORD
          ports:
            - containerPort: 8080 