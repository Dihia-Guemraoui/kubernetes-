#deployement de notre image dans le cluster kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas}}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:     #ajouter les secret ici 
        - name: regcred
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repo}}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: Always  #pour lui dire de retirer toujour limage dici 
          env:
            - name: BACKEND_URL
              value: {{ .Values.frontend.apiUrl}}
          ports:
            - containerPort: 80
