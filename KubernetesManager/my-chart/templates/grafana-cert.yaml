apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-praxis-form-tls
  namespace: {{ .Release.Namespace }}
  # labels:
  #   app.kubernetes.io/instance: praxis-form
  #   app.kubernetes.io/managed-by: Helm
spec:
  secretName: grafana-praxis-form-tls
  dnsNames:
    - grafana.praxis-form.de
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: praxis-form-letsencrypt-prod
  usages:
    - digital signature
    - key encipherment